<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .profile-info, .repos, .stats {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GitHub Profile Dashboard</h1>
        <div class="profile-info">
            <h2>User Profile Information</h2>
            <p><strong>Username:</strong> SoftMarles</p>
            <p><strong>Profile URL:</strong> <a href="https://github.com/SoftMarles">https://github.com/SoftMarles</a></p>
        </div>
        <div class="repos">
            <h2>Repositories</h2>
            <ul>
                <li>Repo 1: <a href="https://github.com/SoftMarles/repo1">repo1</a></li>
                <li>Repo 2: <a href="https://github.com/SoftMarles/repo2">repo2</a></li>
                <li>Repo 3: <a href="https://github.com/SoftMarles/repo3">repo3</a></li>
            </ul>
        </div>
        <div class="stats">
            <h2>GitHub Statistics</h2>
            <p><strong>Public Repositories:</strong> 10</p>
            <p><strong>Followers:</strong> 50</p>
            <p><strong>Following:</strong> 30</p>
        </div>
    </div>
</body>
</html>
